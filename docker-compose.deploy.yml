# docker-compose.deploy.yml
# Run on the Raspberry Pi:
#   docker compose -f docker-compose.deploy.yml up -d
#
# This adds the Next.js app container on top of the Supabase stack.
# Supabase containers are defined in supabase-project/docker-compose.yml
# and must be started FIRST from the supabase-project/ directory.

name: ps4pp-app

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
    container_name: ps4pp-app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/app').then(r => { if (!r.ok) throw new Error(r.status) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_URL: http://caddy:8000
    logging: *default-logging
    networks:
      - supabase_default

networks:
  supabase_default:
    external: true
